# Legion v4 — support services
# Start:  docker-compose up -d
# Stop:   docker-compose down
# Logs:   docker-compose logs -f

version: "3.8"

services:
  redis:
    image: redis:7-alpine
    container_name: swarm-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    command: redis-server --appendonly yes --maxmemory 2gb --maxmemory-policy allkeys-lru
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 3

  chromadb:
    image: ghcr.io/chroma-core/chroma:latest
    container_name: swarm-chromadb
    ports:
      - "8000:8000"
    volumes:
      - chroma_data:/chroma/chroma
    environment:
      - ALLOW_RESET=TRUE
      - ANONYMIZED_TELEMETRY=FALSE
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/api/v1/heartbeat"]
      interval: 15s
      timeout: 10s
      retries: 3

  # Uncomment to run the bot itself in Docker (needs X11/display passthrough)
  # legion-bot:
  #   build: .
  #   container_name: legion-bot
  #   env_file: .env
  #   volumes:
  #     - .:/app
  #     - /tmp/.X11-unix:/tmp/.X11-unix
  #   environment:
  #     - DISPLAY=${DISPLAY}
  #   depends_on:
  #     redis:
  #       condition: service_healthy
  #     chromadb:
  #       condition: service_healthy
  #   # GPU passthrough for RTX 3060 (NVIDIA Container Toolkit required)
  #   deploy:
  #     resources:
  #       reservations:
  #         devices:
  #           - driver: nvidia
  #             count: 1
  #             capabilities: [gpu]
  #   restart: unless-stopped

volumes:
  redis_data:
    driver: local
  chroma_data:
    driver: local
